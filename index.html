<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Sessions</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%23C45A36'/%3E%3Cpath d='M19.5 12.5c0 0-1.5-1.5-3.5-1.5s-3.5 1.5-3.5 1.5' stroke='%23FFF' stroke-width='1.8' stroke-linecap='round' fill='none'/%3E%3Cpath d='M12.5 17c0 0 1 2.5 3.5 2.5s3.5-2.5 3.5-2.5' stroke='%23FFF' stroke-width='1.8' stroke-linecap='round' fill='none'/%3E%3Ccircle cx='13.5' cy='14.5' r='1' fill='%23FFF'/%3E%3Ccircle cx='18.5' cy='14.5' r='1' fill='%23FFF'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23C45A36'/%3E%3Cpath d='M90 30C56.9 30 30 56.9 30 90s26.9 60 60 60 60-26.9 60-60S123.1 30 90 30z' fill='%23F5EDE8' opacity='0.25'/%3E%3Cpath d='M110 70c0 0-8-9-20-9s-20 9-20 9' stroke='%23FFF' stroke-width='8' stroke-linecap='round' fill='none'/%3E%3Cpath d='M70 100c0 0 6 15 20 15s20-15 20-15' stroke='%23FFF' stroke-width='8' stroke-linecap='round' fill='none'/%3E%3Ccircle cx='76' cy='85' r='6' fill='%23FFF'/%3E%3Ccircle cx='104' cy='85' r='6' fill='%23FFF'/%3E%3C/svg%3E">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF6F1;
    --bg-surface: #FFFFFF;
    --bg-sidebar: #F3EDE5;
    --bg-hover: #EDE7DD;
    --bg-active: #E8DFD3;
    --border: #E0D6C8;
    --border-light: #EDE7DD;
    --text: #1A1A1A;
    --text-secondary: #5C5650;
    --text-dim: #8A7F74;
    --text-faint: #B5AA9D;
    --accent: #C45A36;
    --accent-hover: #A84B2C;
    --accent-light: #F2DDD4;
    --accent-faint: #FAF0EB;
    --user-bg: #FFFFFF;
    --claude-bg: #FBF5EF;
    --tool-bg: #F5F0E8;
    --tool-border: #D4C4B0;
    --green: #2D8A4E;
    --shadow-sm: 0 1px 2px rgba(26,26,26,0.04);
    --shadow-md: 0 2px 8px rgba(26,26,26,0.06);
    --shadow-lg: 0 4px 16px rgba(26,26,26,0.08);
    --radius: 10px;
    --radius-sm: 6px;
  }

  [data-theme="dark"] {
    --bg: #1A1816;
    --bg-surface: #242220;
    --bg-sidebar: #1E1C1A;
    --bg-hover: #2E2C28;
    --bg-active: #383430;
    --border: #3A3630;
    --border-light: #2E2C28;
    --text: #E8E0D8;
    --text-secondary: #A89E94;
    --text-dim: #7A7068;
    --text-faint: #5A5248;
    --accent-light: #3A2820;
    --accent-faint: #2A1E18;
    --user-bg: #242220;
    --claude-bg: #2A2520;
    --tool-bg: #2A2820;
    --tool-border: #3A3630;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
    --shadow-md: 0 2px 8px rgba(0,0,0,0.3);
    --shadow-lg: 0 4px 16px rgba(0,0,0,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ── */
  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: auto 1fr;
    height: 100vh;
    transition: grid-template-columns 0.2s ease;
  }

  .app.sidebar-expanded {
    grid-template-columns: 65vw 1fr;
  }

  /* ── Top Bar ── */
  .topbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-surface);
  }

  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .topbar-logo {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .topbar-logo svg {
    width: 24px;
    height: 24px;
  }

  .topbar h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--text);
    font-optical-sizing: auto;
  }

  .topbar-nav {
    display: flex;
    gap: 2px;
    background: var(--bg);
    border-radius: 8px;
    padding: 3px;
  }

  .topbar-nav button {
    padding: 6px 16px;
    border: none;
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .topbar-nav button:hover { color: var(--text-secondary); }
  .topbar-nav button.active {
    background: var(--bg-surface);
    color: var(--text);
    box-shadow: var(--shadow-sm);
  }

  /* ── Sidebar ── */
  .sidebar {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--bg-sidebar);
    overflow: hidden;
  }

  .search-box {
    padding: 14px 14px 10px;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .search-box input { flex: 1; }

  .expand-toggle {
    width: 32px;
    height: 32px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .expand-toggle:hover {
    background: var(--bg-hover);
    border-color: var(--text-faint);
    color: var(--text-secondary);
  }

  .expand-toggle.active {
    background: var(--accent-faint);
    border-color: var(--accent);
    color: var(--accent);
  }

  .expand-toggle svg { width: 16px; height: 16px; }

  /* ── Expanded sidebar ── */
  .app.sidebar-expanded .session-list {
    padding: 12px 18px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
    align-content: start;
  }

  .app.sidebar-expanded .session-item {
    padding: 0;
    margin-bottom: 0;
    background: var(--bg-surface);
    border: 1px solid var(--border-light);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    transition: all 0.18s ease;
    box-shadow: var(--shadow-sm);
  }

  .app.sidebar-expanded .session-item:hover {
    border-color: var(--border);
    box-shadow: var(--shadow-lg);
    transform: translateY(-2px);
  }

  .app.sidebar-expanded .session-item.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light), var(--shadow-md);
    transform: none;
  }

  /* Card top accent stripe */
  .app.sidebar-expanded .session-item .card-accent {
    display: block;
    height: 1.5px;
    background: var(--border-light);
    margin: 0 22px;
    transition: background 0.15s ease;
  }

  .app.sidebar-expanded .session-item:hover .card-accent {
    background: var(--accent-light);
  }

  .app.sidebar-expanded .session-item.active .card-accent {
    background: var(--accent);
    opacity: 0.4;
  }

  .app.sidebar-expanded .session-item .name {
    white-space: normal !important;
    overflow: visible !important;
    text-overflow: clip !important;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 16.5px;
    font-weight: 500;
    font-optical-sizing: auto;
    margin-bottom: 0;
    line-height: 1.35;
    letter-spacing: -0.015em;
    padding: 18px 22px 14px;
    color: var(--text) !important;
  }

  /* Hide compact meta row in expanded mode */
  .app.sidebar-expanded .session-item .meta { display: none !important; }

  /* Show expanded card content */
  .app.sidebar-expanded .session-item .expanded-card {
    display: flex !important;
    flex-direction: column;
    flex: 1;
    padding: 14px 22px 18px;
    visibility: visible !important;
    opacity: 1 !important;
  }

  .expanded-card { display: none; }

  /* Ensure card children are visible in expanded mode */
  .app.sidebar-expanded .session-item .card-stats,
  .app.sidebar-expanded .session-item .card-info,
  .app.sidebar-expanded .session-item .card-footer,
  .app.sidebar-expanded .session-item .card-accent {
    display: flex;
    visibility: visible;
  }
  .app.sidebar-expanded .session-item .card-accent {
    display: block;
  }

  /* Card accent stripe hidden in collapsed mode */
  .session-item .card-accent { display: none; }

  /* ── Stats pills ── */
  .expanded-card .card-stats {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .expanded-card .card-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12.5px;
    color: var(--text-dim);
    border: none;
    background: none;
    padding: 0;
  }

  .expanded-card .card-pill svg {
    width: 14px;
    height: 14px;
    color: var(--text-faint);
    flex-shrink: 0;
    opacity: 0.5;
  }

  .expanded-card .card-pill strong {
    font-weight: 500;
    color: var(--text-secondary);
  }

  /* ── Info rows ── */
  .expanded-card .card-info {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
    padding: 12px 14px;
    background: var(--bg);
    border-radius: 10px;
    border: 1px solid var(--border-light);
  }

  .expanded-card .card-info-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    min-width: 0;
  }

  .expanded-card .card-info-row svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    color: var(--accent);
    opacity: 0.7;
  }

  .expanded-card .card-info-row .info-value {
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
  }

  /* ── Card footer: badges + timestamp ── */
  .expanded-card .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-top: auto;
  }

  .expanded-card .card-badges {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .expanded-card .card-badges .ws-badge {
    font-size: 11.5px;
    padding: 3px 12px;
    max-width: none;
    border-radius: 10px;
    font-weight: 500;
  }

  .expanded-card .card-created {
    font-size: 11.5px;
    color: var(--text-faint);
    white-space: nowrap;
    margin-left: auto;
  }

  .search-box input {
    width: 100%;
    padding: 9px 14px 9px 36px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-surface);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: all 0.2s ease;
    background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='10.5' cy='10.5' r='6.5' stroke='%23B5AA9D' stroke-width='2'/%3E%3Cpath d='M15.5 15.5L20 20' stroke='%23B5AA9D' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: 12px center;
  }

  .search-box input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .search-box input::placeholder { color: var(--text-faint); }

  .workspace-filters {
    padding: 0 14px 10px;
    position: relative;
  }

  .filter-trigger {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-surface);
    color: var(--text-secondary);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .filter-trigger:hover { border-color: var(--text-faint); }

  .filter-trigger.open {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .filter-trigger svg { width: 14px; height: 14px; flex-shrink: 0; color: var(--text-dim); }

  .filter-trigger .filter-label { flex: 1; text-align: left; }

  .filter-trigger .filter-chevron {
    width: 10px;
    height: 10px;
    flex-shrink: 0;
    color: var(--text-faint);
    transition: transform 0.15s ease;
  }

  .filter-trigger.open .filter-chevron { transform: rotate(180deg); }

  .filter-menu {
    position: absolute;
    top: calc(100% - 4px);
    left: 14px;
    right: 14px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow-lg);
    z-index: 50;
    max-height: 280px;
    overflow-y: auto;
    display: none;
    padding: 4px;
  }

  .filter-menu.open { display: block; }

  .filter-menu::-webkit-scrollbar { width: 4px; }
  .filter-menu::-webkit-scrollbar-track { background: transparent; }
  .filter-menu::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .filter-option {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    text-align: left;
    transition: background 0.1s ease;
  }

  .filter-option:hover { background: var(--bg-hover); }

  .filter-option.active { color: var(--accent); }

  .filter-option .check {
    width: 14px;
    flex-shrink: 0;
    font-size: 12px;
    color: var(--accent);
  }

  .filter-option .filter-opt-label { flex: 1; }

  .filter-option .filter-opt-count {
    font-size: 11px;
    color: var(--text-faint);
  }

  .filter-divider {
    height: 1px;
    background: var(--border);
    margin: 4px 8px;
  }

  .filter-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    text-align: left;
    transition: background 0.1s ease;
  }

  .filter-toggle:hover { background: var(--bg-hover); }

  .filter-toggle .toggle-check {
    width: 14px;
    height: 14px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 10px;
    color: var(--accent);
    transition: all 0.15s ease;
  }

  .filter-toggle .toggle-check.checked {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .session-list {
    flex: 1;
    overflow-y: auto;
    padding: 2px 8px;
  }

  .session-list::-webkit-scrollbar { width: 5px; }
  .session-list::-webkit-scrollbar-track { background: transparent; }
  .session-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .session-list::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

  .session-item {
    padding: 10px 12px;
    cursor: pointer;
    border-radius: 8px;
    margin-bottom: 2px;
    transition: all 0.12s ease;
    border: 1px solid transparent;
  }

  .session-item:hover { background: var(--bg-hover); }

  .session-item.active {
    background: var(--bg-surface);
    border-color: var(--border);
    box-shadow: var(--shadow-sm);
  }

  .session-item .name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
    line-height: 1.3;
  }

  .session-item.active .name { color: var(--accent); }

  .session-item .meta {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .session-item .meta .dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--text-faint);
  }

  .session-item .ws-badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 8px;
    background: var(--accent-faint);
    color: var(--accent);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 120px;
  }

  .sidebar-footer {
    padding: 12px 14px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-faint);
    text-align: center;
    letter-spacing: 0.02em;
  }

  /* ── Main Content ── */
  .main {
    overflow-y: auto;
    padding: 0;
    background: var(--bg);
  }

  .main::-webkit-scrollbar { width: 7px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Welcome Screen ── */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    padding: 40px;
  }

  .welcome-icon {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: var(--accent-faint);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }

  .welcome-icon svg { width: 32px; height: 32px; }

  .welcome h2 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .welcome p {
    font-size: 14px;
    max-width: 380px;
    line-height: 1.6;
    color: var(--text-dim);
  }

  .welcome kbd {
    padding: 2px 7px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg-surface);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-secondary);
  }

  /* ── Conversation View ── */
  .conversation-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    box-shadow: var(--shadow-sm);
  }

  .conversation-header h2 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .conversation-header .meta-row {
    display: flex;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
    flex-wrap: wrap;
    align-items: center;
  }

  .conversation-header .meta-row span {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .meta-separator {
    color: var(--text-faint);
  }

  .header-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .action-btn {
    padding: 7px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text-secondary);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    letter-spacing: 0.01em;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .action-btn:hover {
    background: var(--bg);
    border-color: var(--text-dim);
  }

  .action-btn.primary {
    border-color: var(--accent);
    color: var(--accent);
  }

  .action-btn.primary:hover {
    background: var(--accent);
    color: white;
  }

  .action-btn svg {
    width: 14px;
    height: 14px;
  }

  .summary-panel {
    margin: 16px 32px;
    max-width: 900px;
    padding: 18px 22px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--accent-faint);
  }

  .summary-panel.loading {
    color: var(--text-dim);
    font-style: italic;
  }

  .summary-panel .summary-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .summary-panel .summary-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .summary-panel .summary-label svg {
    width: 14px;
    height: 14px;
  }

  .summary-panel .summary-refresh {
    font-size: 11px;
    color: var(--text-faint);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
  }

  .summary-panel .summary-refresh:hover {
    color: var(--accent);
    background: var(--accent-light);
  }

  .summary-panel .summary-content {
    font-size: 13.5px;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
  }

  .summary-panel .summary-content strong {
    color: var(--text);
  }

  .messages {
    padding: 24px 32px 60px;
    max-width: 900px;
    margin: 0 auto;
  }

  .message {
    margin-bottom: 8px;
    padding: 18px 22px;
    border-radius: var(--radius);
    position: relative;
  }

  .message.user {
    background: var(--user-bg);
    border: 1px solid var(--border-light);
  }

  .message.assistant {
    background: var(--claude-bg);
    border: 1px solid #EAE0D3;
  }

  .message .role-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .message.user .role-label { color: var(--text-secondary); }

  .message.assistant .role-label { color: var(--accent); }

  .role-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }

  .message.user .role-dot { background: var(--text-dim); }
  .message.assistant .role-dot { background: var(--accent); }

  .message .content {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message .content code {
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--tool-bg);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    color: var(--text-secondary);
    border: 1px solid var(--border-light);
  }

  .message .content .tool-use {
    display: block;
    margin: 8px 0;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    background: var(--tool-bg);
    border: 1px solid var(--tool-border);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .message .timestamp {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 8px;
  }

  /* ── Timeline View ── */
  .timeline-view {
    padding: 28px 32px;
    max-width: 800px;
    margin: 0 auto;
  }

  .timeline-day {
    margin-bottom: 28px;
  }

  .timeline-day h3 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    letter-spacing: -0.01em;
  }

  .timeline-day h3 .day-count {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: var(--text-faint);
    margin-left: 6px;
  }

  .timeline-session {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.12s ease;
    border: 1px solid transparent;
  }

  .timeline-session:hover {
    background: var(--bg-surface);
    border-color: var(--border-light);
    box-shadow: var(--shadow-sm);
  }

  .timeline-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;

  }

  .timeline-session .ts-name {
    font-size: 13px;
    font-weight: 500;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  .timeline-session .ts-meta {
    font-size: 11px;
    color: var(--text-faint);
    white-space: nowrap;
  }

  /* ── Stats View ── */
  .stats-view {
    padding: 28px 32px;
    max-width: 900px;
    margin: 0 auto;
  }

  .stats-view > h2 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 24px;
    letter-spacing: -0.02em;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 36px;
  }

  .stat-card {
    padding: 22px 20px;
    border: 1px solid var(--border);

    background: var(--bg-surface);
    box-shadow: var(--shadow-sm);

  .stat-card .label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
    font-weight: 500;

  .stat-card .value {

    font-weight: 700;

  }

  .chart-section {
    margin-bottom: 36px;
  }

  .chart-section h3 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 16px;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .bar-chart {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 12px;

  .bar-label {
    font-size: 12px;

    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bar-track {
    flex: 1;
    height: 24px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 1px solid var(--border-light);
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-light), var(--accent));
    border-radius: var(--radius-sm);
    transition: width 0.4s ease;

  }

  .bar-value {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    width: 36px;
  }

  /* ── Activity Chart ── */
  .activity-chart {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 130px;
    padding: 0 4px 0 0;

  .activity-bar {
    flex: 1;

  /* ── Terminal Panel ── */

  .terminal-panel {

  .terminal-header .terminal-title {
    font-family: 'JetBrains Mono', monospace;

  }

  .terminal-header .terminal-title .term-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;

  }

  .terminal-header .terminal-actions {
    display: flex;
    gap: 4px;
  }

  .terminal-header .terminal-actions button {
    background: transparent;
    border: 1px solid #444;
    border-radius: 4px;
    color: #999;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .terminal-header .terminal-actions button:hover {
    background: #333;
    color: #ccc;
    border-color: #666;
  }

  .terminal-body {

    overflow: hidden;
    padding: 4px;
  }

  .terminal-body .xterm {
    height: 100%;
  }

  .topbar-terminal-btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .topbar-terminal-btn:hover {
    background: var(--bg);
    border-color: var(--text-dim);
  }

  .topbar-terminal-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .topbar-terminal-btn svg {
    width: 14px;
    height: 14px;
  }

  /* ── Utility ── */
  .hidden { display: none !important; }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 12px 20px;
    background: var(--bg-surface);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    color: var(--accent);
    font-size: 13px;
    font-weight: 500;
    z-index: 100;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.2s ease;
    pointer-events: none;
    box-shadow: var(--shadow-lg);
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── Loading state ── */
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  .loading-text {
    color: var(--text-faint);
    font-style: italic;
    padding: 24px;
  }
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
<script>
// ── Theme ──
function getPreferredTheme() {
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('theme-icon').innerHTML = theme === 'dark' ? '&#9788;' : '&#9790;';
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  applyTheme(current === 'dark' ? 'light' : 'dark');
}

applyTheme(getPreferredTheme());
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => applyTheme(e.matches ? 'dark' : 'light'));

// ── State ──
let allSessions = [];
let allWorkspaces = [];
let currentSessionId = null;
let currentView = 'conversation';
let activeWorkspace = null;  // null = show all
let hideAutoTagged = true;   // hide Skill Planner sessions by default
let sidebarExpanded = false;

// ── API ──
const api = {
  async sessions(search = '') {
    const params = new URLSearchParams({ limit: '500' });
    if (search) params.set('search', search);
    if (activeWorkspace) params.set('workspace', activeWorkspace);
    const res = await fetch(`/api/sessions?${params}`);
    return res.json();
  },
  async workspaces() {
    const res = await fetch('/api/workspaces');
    return res.json();
  },
  async messages(sessionId) {
    const res = await fetch(`/api/sessions/${sessionId}/messages`);
    return res.json();
  },
  async stats() {
    const res = await fetch('/api/stats');
    return res.json();
  },
  async timeline() {
    const res = await fetch('/api/timeline');
    return res.json();
  }
};

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Time formatting ──
function timeAgo(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  const now = new Date();
  const sec = (now - dt) / 1000;
  if (sec < 60) return 'just now';
  if (sec < 3600) return Math.floor(sec / 60) + 'm ago';
  if (sec < 86400) return Math.floor(sec / 3600) + 'h ago';
  if (sec < 604800) return Math.floor(sec / 86400) + 'd ago';
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function formatTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString('en-US', {
    month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
  });
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const today = new Date();
  const yesterday = new Date(today);
  yesterday.setDate(yesterday.getDate() - 1);

  if (d.toDateString() === today.toDateString()) return 'Today';
  if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function shortProject(p) {
  if (!p) return '';
  const homeMatch = p.match(/^(\/Users\/[^/]+)/);
  if (homeMatch) return '~' + p.slice(homeMatch[1].length);
  return p;
}

// ── Render Content ──
function renderContent(text) {
  let html = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  html = html.replace(/\[Tool: (\w+)\](.*)/g,
    '<span class="tool-use">$1$2</span>');

  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

  return html;
}

// ── Session List ──
async function loadSessions(search = '') {
  try {
    const data = await api.sessions(search);
    allSessions = data.sessions || [];
    renderSessionList();
  } catch (e) {
    console.error('Failed to load sessions:', e);
    // Retry once after a short delay
    setTimeout(async () => {
      try {
        const data = await api.sessions(search);
        allSessions = data.sessions || [];
        renderSessionList();
      } catch (e2) {
        console.error('Retry failed:', e2);
      }
    }, 1000);
  }
}

function renderSessionList() {
  const list = document.getElementById('sessionList');
  const footer = document.getElementById('sidebarFooter');

  const filtered = hideAutoTagged
    ? allSessions.filter(s => !s.autoTag)
    : allSessions;
  const hiddenCount = allSessions.length - filtered.length;

  list.innerHTML = filtered.map(s => `
    <div class="session-item ${s.id === currentSessionId ? 'active' : ''}"
         data-id="${s.id}" onclick="selectSession('${s.id}')">
      <div class="name">${esc(s.name)}</div>
      <div class="meta">
        <span>${timeAgo(s.modified || s.created)}</span>
        <span class="dot"></span>
        <span>${s.messageCount} msgs</span>
        ${s.workspace ? `<span class="dot"></span><span class="ws-badge">${esc(s.workspace)}</span>` : ''}
        ${s.autoTag ? `<span class="dot"></span><span class="ws-badge" style="background:#EDE7DD;color:var(--text-dim)">${esc(s.autoTag)}</span>` : ''}
      </div>
      <div class="card-accent"></div>
      <div class="expanded-card">
        <div class="card-stats">
          <span class="card-pill">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <strong>${timeAgo(s.modified || s.created)}</strong>
          </span>
          <span class="card-pill">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <strong>${s.messageCount}</strong> messages
          </span>
        </div>
        ${s.projectPath || s.gitBranch ? `
          <div class="card-info">
            ${s.projectPath ? `
              <div class="card-info-row">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                <span class="info-value">${shortProject(s.projectPath)}</span>
              </div>
            ` : ''}
            ${s.gitBranch ? `
              <div class="card-info-row">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>
                <span class="info-value">${esc(s.gitBranch)}</span>
              </div>
            ` : ''}
          </div>
        ` : ''}
        <div class="card-footer">
          <div class="card-badges">
            ${s.workspace ? `<span class="ws-badge">${esc(s.workspace)}</span>` : ''}
            ${s.autoTag ? `<span class="ws-badge" style="background:var(--bg-hover);color:var(--text-dim)">${esc(s.autoTag)}</span>` : ''}
          </div>
          ${s.created ? `<span class="card-created">${formatTime(s.created)}</span>` : ''}
        </div>
      </div>
    </div>
  `).join('');

  let footerText = `${filtered.length} sessions`;
  if (activeWorkspace) footerText += ` in ${activeWorkspace}`;
  if (hiddenCount > 0) footerText += ` (${hiddenCount} hidden)`;
  footer.textContent = footerText;
}

function toggleAutoTagged() {
  hideAutoTagged = !hideAutoTagged;
  renderSessionList();
  renderWorkspaceFilters();
}

async function loadWorkspaces() {
  const data = await api.workspaces();
  allWorkspaces = data.workspaces;
  renderWorkspaceFilters();
}

function renderWorkspaceFilters() {
  const container = document.getElementById('workspaceFilters');
  if (!allWorkspaces.length) {
    container.innerHTML = '';
    return;
  }

  const autoTagCount = allSessions.filter(s => s.autoTag).length;
  const triggerLabel = activeWorkspace ? esc(activeWorkspace) : 'All workspaces';
  const isOpen = container.querySelector('.filter-menu.open') !== null;

  container.innerHTML = `
    <button class="filter-trigger ${isOpen ? 'open' : ''}" onclick="toggleFilterDropdown(event)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      <span class="filter-label">${triggerLabel}</span>
      <svg class="filter-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div class="filter-menu ${isOpen ? 'open' : ''}">
      <button class="filter-option ${!activeWorkspace ? 'active' : ''}" onclick="filterWorkspace(null)">
        <span class="check">${!activeWorkspace ? '&#10003;' : ''}</span>
        <span class="filter-opt-label">All workspaces</span>
      </button>
      ${allWorkspaces.map(ws => `
        <button class="filter-option ${activeWorkspace === ws.name ? 'active' : ''}" onclick="filterWorkspace('${esc(ws.name)}')">
          <span class="check">${activeWorkspace === ws.name ? '&#10003;' : ''}</span>
          <span class="filter-opt-label">${esc(ws.name)}</span>
          <span class="filter-opt-count">${ws.sessionCount}</span>
        </button>
      `).join('')}
      ${autoTagCount > 0 ? `
        <div class="filter-divider"></div>
        <button class="filter-toggle" onclick="toggleAutoTagged(); event.stopPropagation();">
          <span class="toggle-check ${!hideAutoTagged ? 'checked' : ''}">${!hideAutoTagged ? '&#10003;' : ''}</span>
          Show Skill Planner (${autoTagCount})
        </button>
      ` : ''}
    </div>
  `;
}

function toggleFilterDropdown(e) {
  e.stopPropagation();
  const trigger = e.currentTarget;
  const menu = trigger.nextElementSibling;
  const isOpen = menu.classList.contains('open');
  if (isOpen) {
    trigger.classList.remove('open');
    menu.classList.remove('open');
  } else {
    trigger.classList.add('open');
    menu.classList.add('open');
  }
}

function closeFilterDropdown() {
  const trigger = document.querySelector('.filter-trigger');
  const menu = document.querySelector('.filter-menu');
  if (trigger) trigger.classList.remove('open');
  if (menu) menu.classList.remove('open');
}

function filterWorkspace(ws) {
  activeWorkspace = ws;
  closeFilterDropdown();
  renderWorkspaceFilters();
  loadSessions(document.getElementById('search').value);
}

// Close filter dropdown when clicking outside
document.addEventListener('click', (e) => {
  if (!e.target.closest('.workspace-filters')) {
    closeFilterDropdown();
  }
});

function toggleSidebarExpand() {
  sidebarExpanded = !sidebarExpanded;
  const app = document.querySelector('.app');
  const btn = document.getElementById('expandToggle');
  app.classList.toggle('sidebar-expanded', sidebarExpanded);
  btn.classList.toggle('active', sidebarExpanded);
  // Update icon
  btn.innerHTML = sidebarExpanded
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>';
  renderSessionList();
}

function esc(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Conversation View ──
async function selectSession(sessionId) {
  // Auto-collapse expanded sidebar
  if (sidebarExpanded) {
    sidebarExpanded = false;
    const app = document.querySelector('.app');
    const btn = document.getElementById('expandToggle');
    app.classList.remove('sidebar-expanded');
    btn.classList.remove('active');
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>';
  }
  currentSessionId = sessionId;
  renderSessionList();

  const session = allSessions.find(s => s.id === sessionId);
  if (!session) return;

  switchView('conversation');

  const header = document.getElementById('convHeader');
  header.innerHTML = `
    <h2>${esc(session.name)}</h2>
    <div class="meta-row">
      <span>${formatTime(session.created)}</span>
      <span class="meta-separator">&middot;</span>
      <span>${session.messageCount} messages</span>
      <span class="meta-separator">&middot;</span>
      <span>${shortProject(session.projectPath)}</span>
      ${session.workspace ? `<span class="meta-separator">&middot;</span><span>${esc(session.workspace)}</span>` : ''}
      ${session.gitBranch ? `<span class="meta-separator">&middot;</span><span>${esc(session.gitBranch)}</span>` : ''}
    </div>
    <div class="header-actions">
      <button class="action-btn primary" onclick="copyCmd('claude --resume ${session.id}', 'Resume command copied!')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy
      </button>
      <button class="action-btn" onclick="copyCmd('claude --resume ${session.id} --fork-session', 'Fork command copied!')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/><path d="M18 9v1a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V9"/><line x1="12" y1="12" x2="12" y2="15"/></svg>
        Fork
      </button>
      <button class="action-btn" onclick="resumeInTerminal('${session.id}', '${esc(session.projectPath)}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        Continue
      </button>
      <button class="action-btn" onclick="loadSummary('${session.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Summarize
      </button>
    </div>
  `;

  const container = document.getElementById('messagesContainer');
  container.innerHTML = '<div class="loading-text">Loading conversation...</div>';

  const data = await api.messages(sessionId);
  container.innerHTML = data.messages.map(m => `
    <div class="message ${m.role}">
      <div class="role-label"><span class="role-dot"></span>${m.role === 'user' ? 'You' : 'Claude'}</div>
      <div class="content">${renderContent(m.content)}</div>
      ${m.timestamp ? `<div class="timestamp">${formatTime(m.timestamp)}</div>` : ''}
    </div>
  `).join('');

  document.getElementById('summaryPanel').classList.add('hidden');
  document.getElementById('mainContent').scrollTop = 0;

function copyCmd(text, toastMsg) {
  navigator.clipboard.writeText(text).then(() => {
    showToast(toastMsg);
  });
}

async function loadSummary(sessionId, refresh = false) {
  const panel = document.getElementById('summaryPanel');
  panel.classList.remove('hidden');
  panel.classList.add('loading');
  panel.innerHTML = `
    <div class="summary-header">
      <span class="summary-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Summary
      </span>
    </div>
    <div class="summary-content">Generating summary...</div>
  `;

  const params = refresh ? '?refresh=true' : '';
  const data = await fetch(`/api/sessions/${sessionId}/summary${params}`).then(r => r.json());

  panel.classList.remove('loading');

  if (data.error) {
    panel.innerHTML = `<div class="summary-content" style="color:var(--text-dim)">${esc(data.error)}</div>`;
    return;
  }

  const cachedLabel = data.cached ? ' (cached)' : '';
  panel.innerHTML = `
    <div class="summary-header">
      <span class="summary-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Summary${cachedLabel}
      </span>
      <button class="summary-refresh" onclick="loadSummary('${sessionId}', true)">Regenerate</button>
    </div>
    <div class="summary-content">${renderContent(data.summary)}</div>
  `;
}

          <span>${stats.sessionsByDay.length > 0 ? stats.sessionsByDay[stats.sessionsByDay.length - 1][0].slice(5) : ''}</span>
        </div>
      </div>

      <div class="chart-section">
        <h3>Sessions by Project</h3>

            <div class="bar-row">

              <div class="bar-track">
                <div class="bar-fill" style="width: ${(count / maxProject) * 100}%"></div>
              </div>
              <div class="bar-value">${count}</div>

// ── View Switching ──
function switchView(view) {
  currentView = view;

  document.querySelectorAll('.topbar-nav button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === view);
  });

  document.getElementById('welcomeScreen').classList.toggle('hidden', view !== 'welcome');
  document.getElementById('conversationView').classList.toggle('hidden',
    view !== 'conversation' || !currentSessionId);
  document.getElementById('timelineView').classList.toggle('hidden', view !== 'timeline');
  document.getElementById('statsView').classList.toggle('hidden', view !== 'stats');

  if (view === 'conversation' && !currentSessionId) {
    document.getElementById('welcomeScreen').classList.remove('hidden');
  }

  if (view === 'timeline') renderTimeline();
  if (view === 'stats') renderStats();
}

// ── Events ──
document.querySelectorAll('.topbar-nav button').forEach(btn => {
  btn.addEventListener('click', () => switchView(btn.dataset.view));
});

let searchTimeout;
document.getElementById('search').addEventListener('input', (e) => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => loadSessions(e.target.value), 200);
});

document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
  if (e.key === 'Escape') {
    const search = document.getElementById('search');
    if (search === document.activeElement) {
      search.value = '';
      search.blur();
      loadSessions();
    }
  }
});

// ── Terminal ──
let term = null;
let termSocket = null;
let termFit = null;
let terminalOpen = false;

function toggleTerminal() {
  terminalOpen = !terminalOpen;
  const app = document.querySelector('.app');
  const btn = document.getElementById('terminalToggle');

  if (terminalOpen) {
    app.classList.add('terminal-open');
    btn.classList.add('active');
    if (!term) {
      initTerminal();
    } else {
      // Reconnect if socket closed
      if (!termSocket || termSocket.readyState !== WebSocket.OPEN) {
        connectTerminal();
      }
      setTimeout(() => termFit.fit(), 50);
    }
  } else {
    app.classList.remove('terminal-open');
    btn.classList.remove('active');
  }
}

function initTerminal() {
  term = new Terminal({
    fontFamily: "'JetBrains Mono', 'Menlo', monospace",
    fontSize: 13,
    lineHeight: 1.3,
    cursorBlink: true,
    cursorStyle: 'bar',
    theme: {
      background: '#1a1a1a',
      foreground: '#e0e0e0',
      cursor: '#C45A36',
      cursorAccent: '#1a1a1a',
      selectionBackground: '#C45A3644',
      black: '#1a1a1a',
      red: '#e55c5c',
      green: '#5cc98a',
      yellow: '#d4a55c',
      blue: '#5c9de5',
      magenta: '#c57bdb',
      cyan: '#5cc9c9',
      white: '#e0e0e0',
      brightBlack: '#666666',
      brightRed: '#ff7b7b',
      brightGreen: '#7bffb5',
      brightYellow: '#ffd07b',
      brightBlue: '#7bb5ff',
      brightMagenta: '#e09bff',
      brightCyan: '#7bffff',
      brightWhite: '#ffffff',
    }
  });

  termFit = new FitAddon.FitAddon();
  const webLinks = new WebLinksAddon.WebLinksAddon();
  term.loadAddon(termFit);
  term.loadAddon(webLinks);

  const container = document.getElementById('terminalBody');
  term.open(container);

  setTimeout(() => termFit.fit(), 50);

  connectTerminal();

  // Handle resize
  const resizeObserver = new ResizeObserver(() => {
    if (terminalOpen && termFit) {
      termFit.fit();
    }
  });
  resizeObserver.observe(container);

  // Send resize events when terminal dimensions change
  term.onResize(({ cols, rows }) => {
    if (termSocket && termSocket.readyState === WebSocket.OPEN) {
      termSocket.send(JSON.stringify({ type: 'resize', cols, rows }));
    }
  });
}

function connectTerminal() {
  const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  termSocket = new WebSocket(`${wsProtocol}//${location.hostname}:3457/ws/terminal`);

  termSocket.binaryType = 'arraybuffer';

  termSocket.onopen = () => {
    // Send initial size
    if (termFit) {
      termFit.fit();
      const dims = termFit.proposeDimensions();
      if (dims) {
        termSocket.send(JSON.stringify({ type: 'resize', cols: dims.cols, rows: dims.rows }));
      }
    }
  };

  termSocket.onmessage = (event) => {
    if (event.data instanceof ArrayBuffer) {
      term.write(new Uint8Array(event.data));
    } else {
      term.write(event.data);
    }
  };

  termSocket.onclose = () => {
    term.write('\r\n\x1b[90m[Terminal disconnected. Toggle to reconnect.]\x1b[0m\r\n');
  };

  // Send keyboard input to the server
  term.onData((data) => {
    if (termSocket && termSocket.readyState === WebSocket.OPEN) {
      termSocket.send(new Blob([data]));
    }
  });
}

async function resumeInTerminal(sessionId, projectPath) {
  // Open terminal if not already open
  if (!terminalOpen) {
    toggleTerminal();
  }

  // Look up the correct launch directory from the JSONL file location
  let launchDir = projectPath;
  try {
    const res = await fetch(`/api/sessions/${sessionId}/launch-dir`);
    const data = await res.json();
    if (data.launchDir) {
      launchDir = data.launchDir;
    }
  } catch (e) {
    // Fall back to projectPath
  }

  // Wait for connection then send the command
  function sendResumeCmd() {
    if (termSocket && termSocket.readyState === WebSocket.OPEN) {
      let cmd = '';
      if (launchDir) {
        cmd += `cd ${launchDir} && `;
      }
      cmd += `claude --resume ${sessionId}\n`;
      termSocket.send(new Blob([cmd]));
      showToast('Resuming session in terminal...');
    } else {
      setTimeout(sendResumeCmd, 200);
    }
  }

  setTimeout(sendResumeCmd, terminalOpen ? 100 : 500);
}

// ── Terminal drag-to-resize ──
(function() {
  const dragBar = document.getElementById('terminalDragBar');
  const panel = document.getElementById('terminalPanel');
  let dragging = false;
  let startY = 0;
  let startH = 0;

  dragBar.addEventListener('mousedown', (e) => {
    dragging = true;
    startY = e.clientY;
    startH = panel.offsetHeight;
    document.body.style.cursor = 'ns-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const delta = startY - e.clientY;
    const newH = Math.max(150, Math.min(window.innerHeight - 200, startH + delta));
    panel.style.height = newH + 'px';
    if (termFit) termFit.fit();
  });

  document.addEventListener('mouseup', () => {
    if (dragging) {
      dragging = false;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  });
})();

// ── Keyboard shortcuts ──
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === '`') {
    e.preventDefault();
    toggleTerminal();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'b') {
    e.preventDefault();
    toggleSidebarExpand();
  }
});

// ── Init ──
loadWorkspaces();
loadSessions();
